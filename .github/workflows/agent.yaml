name: Agent

on:
  push:
    branches:
      - main
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yaml'
      - '.github/ci-gradle.properties'
  pull_request:
    paths:
      - 'agent/**'
      - '.github/workflows/agent.yaml'
      - '.github/ci-gradle.properties'
  workflow_dispatch:

concurrency:
  group: agent-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-build:
    name: "Agent build & test"
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle ; cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Run spotless
        run: ./gradlew spotlessCheck
        working-directory: agent

      - name: Run unit tests
        run: ./gradlew test -PGEMINI_API_KEY=dummy_key
        working-directory: agent

      - name: Build Debug and Release APKs
        run: ./gradlew assembleDebug assembleRelease -PGEMINI_API_KEY=dummy_key
        working-directory: agent

      - name: Upload Agent APKs
        uses: actions/upload-artifact@v7
        with:
          name: agent-apks
          path: agent/app/build/outputs/apk/**/*.apk

